<!DOCTYPE html>
<html>
<head>
    <title>Basic HTML Page</title>
</head>
<body>
    <header>
        <h1>Welcome to My Website!</h1>
        <!-- Navigation link to tweets.html -->
        <a href="tweets.html">View My Tweets</a>
    </header>
    <main>
        <article>
            <h2>Featured Tweet</h2>
            <!-- Embedded Tweet (replace with your own tweet URL) -->
            <blockquote class="twitter-tweet">
                <p lang="en" dir="ltr">Example tweet text. Replace this with your own tweet link in the code below.</p>
                &mdash; Twitter User (@TwitterUser) <a href="https://twitter.com/TwitterUser/status/123456789">January 1, 2023</a>
            </blockquote>
            <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
        </article>
    </main>
    <footer>
        <!-- Link back to homepage -->
        <a href="index.html">Return to Homepage</a>
        <p>© 2023 My Website</p>
    </footer>
</body>
</html>
